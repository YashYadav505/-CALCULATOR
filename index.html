<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcultor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc">
       <input type="text" id="screen" readonly>
        <div class="buttons">
        <button class="key" id="btn1">AC</button>
        <button class="key" id="btn2">%</button>
        <button class="key" id="btn3">⌫</button>
        <button class="key" id="btn4">+</button>
        <button class="key" id="btn5">7</button>
        <button class="key" id="btn6">8</button>
        <button class="key" id="btn7">9</button>
        <button class="key" id="btn8">/</button>
        <button class="key" id="btn9">4</button>
        <button class="key" id="btn10">5</button>
        <button class="key" id="btn11">6</button>
        <button class="key" id="btn12">X</button>
        <button class="key" id="btn13">1</button>
        <button class="key" id="btn14">2</button>
        <button class="key" id="btn15">3</button>
        <button class="key" id="btn16">-</button>
        <button class="key" id="btn17">00</button>
        <button class="key" id="btn18">0</button>
        <button class="key" id="btn19">.</button>
        <button class="key" id="btn20">=</button>
        
        </div>
    </div>
    
<script src="app.js"></script>    
</body>
</html>
